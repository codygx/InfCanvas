<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Infinite Canvas – Drag & Drop Images</title>
  <link rel="icon" href="data:,">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
    }
    canvas {
      display: block;
      cursor: grab;
    }
    canvas:active {
      cursor: grabbing;
    }
    #versionBadge {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1000;
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      background: rgba(0,0,0,0.45);
      color: #d6f5ff;
      font: 12px/1.2 Consolas, "Courier New", monospace;
      letter-spacing: 0.02em;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="versionBadge" aria-label="App version">InfCanvas v0.1.0</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let layoutIndex = 0;
const APP_NAME = "InfCanvas";
const APP_VERSION_FALLBACK = "0.1.0";
const versionBadge = document.getElementById("versionBadge");

function setVersionBadge(version) {
  if (!versionBadge) return;
  versionBadge.textContent = `${APP_NAME} v${version}`;
}

function loadAppVersion() {
  fetch("VERSION", { cache: "no-store" })
    .then(res => {
      if (!res.ok) throw new Error("VERSION file not found");
      return res.text();
    })
    .then(text => {
      const version = text.trim() || APP_VERSION_FALLBACK;
      setVersionBadge(version);
    })
    .catch(() => setVersionBadge(APP_VERSION_FALLBACK));
}

loadAppVersion();


function bringForward() {
  if (!selectedImage) return;
  const i = images.indexOf(selectedImage);
  if (i < images.length - 1) {
    [images[i], images[i+1]] = [images[i+1], images[i]];
    draw();
  }
}

function sendBackward() {
  if (!selectedImage) return;
  const i = images.indexOf(selectedImage);
  if (i > 0) {
    [images[i], images[i-1]] = [images[i-1], images[i]];
    draw();
  }
}

function bringToFront() {
  if (!selectedImage) return;
  const i = images.indexOf(selectedImage);
  if (i !== images.length - 1) {
    images.splice(i, 1);
    images.push(selectedImage);
    draw();
  }
}

function sendToBack() {
  if (!selectedImage) return;
  const i = images.indexOf(selectedImage);
  if (i !== 0) {
    images.splice(i, 1);
    images.unshift(selectedImage);
    draw();
  }
}


function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
}
window.addEventListener("resize", resize);

function saveLayout() {
  const data = images.map(img => ({
    src: img.img.src,
    x: img.x,
    y: img.y,
    scale: img.scale
  }));

  fetch("http://localhost:9000", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  }).then(() => {
    console.log("Layout saved");
  });
}

function loadLatestLayout() {
  fetch("http://localhost:9000")
    .then(res => res.json())
    .then(files => {
      if (!files.length) {
        console.log("No saved layouts found");
        return;
      }

      const latest = files[0];
      console.log("Loading:", latest);

      fetch("http://localhost:9000/" + latest)
        .then(res => res.json())
        .then(data => {
          images.length = 0;

          data.forEach(obj => {
            const img = new Image();
            img.src = obj.src;
            img.onload = () => {
              images.push({
                img,
                x: obj.x,
                y: obj.y,
                scale: obj.scale
              });
              draw();
            };
          });
        });
    });
}

function loadLayoutByIndex(index) {
  fetch("http://localhost:9000/")
    .then(res => res.json())
    .then(files => {
      if (!files.length) return;

      // Clamp index to valid range
      if (index < 0) index = 0;
      if (index >= files.length) index = files.length - 1;

      layoutIndex = index; // update global index

      const file = files[index];
      console.log("Loading:", file);

      fetch("http://localhost:9000/" + file)
        .then(res => res.json())
        .then(data => {
          images.length = 0;

          data.forEach(obj => {
            const img = new Image();
            img.src = obj.src;
            img.onload = () => {
              images.push({
                img,
                x: obj.x,
                y: obj.y,
                scale: obj.scale
              });
              draw();
            };
          });
        });
    });
}


document.addEventListener("keydown", e => {
  // Ctrl+S = save
  if (e.ctrlKey && e.key === "s") {
    e.preventDefault();
    saveLayout();
  }

  // Ctrl+L = load latest
  if (e.ctrlKey && e.key === "l") {
    e.preventDefault();
    loadLatestLayout();
  }
  
}, { capture: true });

window.addEventListener("keydown", e => {

  // Load newest
  if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key === "l") {
    e.preventDefault();
    loadLayoutByIndex(0);
  }

  // Load previous
  if (e.ctrlKey && e.shiftKey && !e.altKey && e.key === "l") {
    e.preventDefault();
    loadLayoutByIndex(1);
  }

  // Load two saves back
  if (e.ctrlKey && e.altKey && !e.shiftKey && e.key === "l") {
    e.preventDefault();
    loadLayoutByIndex(2);
  }

  // Scroll newer
  if (e.ctrlKey && e.key === "ArrowUp") {
    e.preventDefault();
    loadLayoutByIndex(layoutIndex - 1);
  }

  // Scroll older
  if (e.ctrlKey && e.key === "ArrowDown") {
    e.preventDefault();
    loadLayoutByIndex(layoutIndex + 1);
  }

});


document.addEventListener("keydown", e => {
  if (!e.ctrlKey) return;

  const isBracketLeft = e.code === "BracketLeft" || e.key === "[" || e.key === "{";
  const isBracketRight = e.code === "BracketRight" || e.key === "]" || e.key === "}";
  const isFrontFallback = e.shiftKey && (e.code === "Home" || e.key === "Home");
  const isBackFallback = e.shiftKey && (e.code === "End" || e.key === "End");

  function logShortcut(action) {
    console.log("[shortcut]", action, {
      key: e.key,
      code: e.code,
      ctrl: e.ctrlKey,
      shift: e.shiftKey,
      alt: e.altKey,
      meta: e.metaKey
    });
  }

  // Bring forward
  if (!e.shiftKey && isBracketRight) {
    e.preventDefault();
    logShortcut("bringForward");
    bringForward();
    return;
  }

  // Send backward
  if (!e.shiftKey && isBracketLeft) {
    e.preventDefault();
    logShortcut("sendBackward");
    sendBackward();
    return;
  }

  // Bring to front
  if (e.shiftKey && isBracketRight) {
    e.preventDefault();
    logShortcut("bringToFront");
    bringToFront();
    return;
  }

  // Send to back
  if (e.shiftKey && isBracketLeft) {
    e.preventDefault();
    logShortcut("sendToBack");
    sendToBack();
    return;
  }

  // Fallbacks that avoid ArrowUp/ArrowDown layout navigation
  if (isFrontFallback) {
    e.preventDefault();
    logShortcut("bringToFront (fallback Ctrl+Shift+Home)");
    bringToFront();
    return;
  }

  if (isBackFallback) {
    e.preventDefault();
    logShortcut("sendToBack (fallback Ctrl+Shift+End)");
    sendToBack();
    return;
  }

}, { capture: true });


// Camera
let offsetX = 0;
let offsetY = 0;
let scale = 1;

// Image selection + dragging
let selectedImage = null;
let dragImageOffsetX = 0;
let dragImageOffsetY = 0;

// Stored images
const images = [];

// Draw grid + images
function draw() {
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.translate(canvas.width/2, canvas.height/2);
  ctx.scale(scale, scale);
  ctx.translate(offsetX, offsetY);

  drawGrid();

  images.forEach(obj => {
    if (!obj.img) return;

    const w = obj.img.width * obj.scale;
    const h = obj.img.height * obj.scale;

    ctx.drawImage(obj.img, obj.x, obj.y, w, h);

    // Draw selection outline
    if (obj === selectedImage) {
      ctx.strokeStyle = "rgba(0,255,255,0.8)";
      ctx.lineWidth = 3 / scale;
      ctx.strokeRect(obj.x, obj.y, w, h);
    }
  });
}

function drawGrid() {
  const step = 200;
  ctx.strokeStyle = "rgba(255,255,255,0.1)";
  ctx.lineWidth = 1 / scale;

  ctx.beginPath();
  for (let x = -5000; x <= 5000; x += step) {
    ctx.moveTo(x, -5000);
    ctx.lineTo(x, 5000);
  }
  for (let y = -5000; y <= 5000; y += step) {
    ctx.moveTo(-5000, y);
    ctx.lineTo(5000, y);
  }
  ctx.stroke();
}

// Hit test
function getImageAtWorldPos(wx, wy) {
  for (let i = images.length - 1; i >= 0; i--) {
    const obj = images[i];
    const w = obj.img.width * obj.scale;
    const h = obj.img.height * obj.scale;

    if (wx >= obj.x && wx <= obj.x + w &&
        wy >= obj.y && wy <= obj.y + h) {
      return obj;
    }
  }
  return null;
}


// Panning + image dragging
let dragging = false;
let lastX = 0;
let lastY = 0;

canvas.addEventListener("mousedown", e => {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left - canvas.width/2;
  const cy = e.clientY - rect.top - canvas.height/2;

  const wx = (cx / scale) - offsetX;
  const wy = (cy / scale) - offsetY;

  const hit = getImageAtWorldPos(wx, wy);
  if (hit) {
    selectedImage = hit;
    dragImageOffsetX = wx - hit.x;
    dragImageOffsetY = wy - hit.y;
    dragging = true;
    return;
  }

  selectedImage = null;
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
});

window.addEventListener("mouseup", () => dragging = false);

window.addEventListener("mousemove", e => {
  if (!dragging) return;

  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left - canvas.width/2;
  const cy = e.clientY - rect.top - canvas.height/2;

  const wx = (cx / scale) - offsetX;
  const wy = (cy / scale) - offsetY;

  if (selectedImage) {
    selectedImage.x = wx - dragImageOffsetX;
    selectedImage.y = wy - dragImageOffsetY;
    draw();
    return;
  }

  offsetX += (e.clientX - lastX) / scale;
  offsetY += (e.clientY - lastY) / scale;
  lastX = e.clientX;
  lastY = e.clientY;
  draw();
});

// Zoom OR resize selected image
canvas.addEventListener("wheel", e => {
  e.preventDefault();

  // SHIFT + wheel = resize selected image
  if (selectedImage && e.shiftKey) {
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    selectedImage.scale *= factor;
    draw();
    return;
  }

  // Normal camera zoom
  const zoom = e.deltaY < 0 ? 1.1 : 0.9;

  const mx = e.clientX - canvas.width/2;
  const my = e.clientY - canvas.height/2;

  const wx = mx/scale - offsetX;
  const wy = my/scale - offsetY;

  scale *= zoom;

  const wx2 = mx/scale - offsetX;
  const wy2 = my/scale - offsetY;

  offsetX += wx2 - wx;
  offsetY += wy2 - wy;

  draw();
}, { passive:false });

// Drag & Drop Images
canvas.addEventListener("dragover", e => e.preventDefault());

canvas.addEventListener("drop", e => {
  e.preventDefault();

  const file = e.dataTransfer.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = evt => {
    const img = new Image();
    img.src = evt.target.result;

    img.onload = () => {
      const rect = canvas.getBoundingClientRect();
      const cx = e.clientX - rect.left - canvas.width/2;
      const cy = e.clientY - rect.top - canvas.height/2;

      const worldX = (cx / scale) - offsetX;
      const worldY = (cy / scale) - offsetY;

      images.push({
        img,
        x: worldX,
        y: worldY,
        scale: 1
      });

      draw();
    };
  };
  reader.readAsDataURL(file);
});

resize();
</script>

</body>
</html>
