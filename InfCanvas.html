<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Infinite Canvas – Drag & Drop Images</title>
  <link rel="icon" href="data:,">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
    }
    canvas {
      display: block;
      cursor: grab;
    }
    canvas:active {
      cursor: grabbing;
    }
    #versionBadge {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1000;
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      background: rgba(0,0,0,0.45);
      color: #d6f5ff;
      font: 12px/1.2 Consolas, "Courier New", monospace;
      letter-spacing: 0.02em;
      pointer-events: none;
      user-select: none;
    }
    #toolbelt {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    #toolbeltToggle {
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      background: rgba(0,0,0,0.6);
      color: #d6f5ff;
      font: 12px/1.2 Consolas, "Courier New", monospace;
      cursor: pointer;
      user-select: none;
    }
    #toolbeltToggle:hover {
      background: rgba(0,0,0,0.75);
    }
    #toolBadge {
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(0,0,0,0.45);
      color: #e3f7ff;
      font: 12px/1.35 Consolas, "Courier New", monospace;
      white-space: pre-line;
      pointer-events: none;
      user-select: none;
    }
    #toolbelt.collapsed #toolBadge {
      display: none;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="versionBadge" aria-label="App version">InfCanvas v0.1.0</div>
<div id="toolbelt">
  <button id="toolbeltToggle" type="button" aria-controls="toolBadge" aria-expanded="true">Hide tools</button>
  <div id="toolBadge" aria-label="Tool status"></div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let layoutIndex = 0;
let currentLayoutFile = null;
const APP_NAME = "InfCanvas";
const APP_VERSION_FALLBACK = "0.1.0";
const versionBadge = document.getElementById("versionBadge");
const toolbelt = document.getElementById("toolbelt");
const toolbeltToggle = document.getElementById("toolbeltToggle");
const toolBadge = document.getElementById("toolBadge");
let toolbeltCollapsed = false;

function updateToolbeltToggle() {
  if (!toolbelt || !toolbeltToggle) return;
  toolbelt.classList.toggle("collapsed", toolbeltCollapsed);
  toolbeltToggle.textContent = toolbeltCollapsed ? "Show tools" : "Hide tools";
  toolbeltToggle.setAttribute("aria-expanded", String(!toolbeltCollapsed));
}

if (toolbeltToggle) {
  toolbeltToggle.addEventListener("click", () => {
    toolbeltCollapsed = !toolbeltCollapsed;
    updateToolbeltToggle();
  });
}

updateToolbeltToggle();

function setVersionBadge(version) {
  if (!versionBadge) return;
  versionBadge.textContent = `${APP_NAME} v${version}`;
}

function loadAppVersion() {
  fetch("VERSION", { cache: "no-store" })
    .then(res => {
      if (!res.ok) throw new Error("VERSION file not found");
      return res.text();
    })
    .then(text => {
      const version = text.trim() || APP_VERSION_FALLBACK;
      setVersionBadge(version);
    })
    .catch(() => setVersionBadge(APP_VERSION_FALLBACK));
}

loadAppVersion();


function defaultCrop() {
  return { left: 0, top: 0, right: 0, bottom: 0 };
}

function normalizeCrop(crop) {
  return {
    left: Number(crop?.left) || 0,
    top: Number(crop?.top) || 0,
    right: Number(crop?.right) || 0,
    bottom: Number(crop?.bottom) || 0
  };
}

function getCropFor(obj) {
  obj.crop = normalizeCrop(obj.crop || defaultCrop());
  return obj.crop;
}

function getRenderBox(obj) {
  const crop = getCropFor(obj);
  const srcX = Math.max(0, Math.min(obj.img.width - 1, crop.left));
  const srcY = Math.max(0, Math.min(obj.img.height - 1, crop.top));
  const srcW = Math.max(1, obj.img.width - srcX - Math.max(0, crop.right));
  const srcH = Math.max(1, obj.img.height - srcY - Math.max(0, crop.bottom));
  const drawW = srcW * obj.scale;
  const drawH = srcH * obj.scale;

  return { srcX, srcY, srcW, srcH, drawW, drawH };
}

function adjustCrop(side, delta) {
  if (!selectedImage || !selectedImage.img) return;
  const crop = getCropFor(selectedImage);
  const size = side === "left" || side === "right" ? selectedImage.img.width : selectedImage.img.height;
  const opposite = side === "left" ? "right" : side === "right" ? "left" : side === "top" ? "bottom" : "top";
  const maxAllowed = Math.max(0, size - 1 - crop[opposite]);
  crop[side] = Math.max(0, Math.min(maxAllowed, crop[side] + delta));
  draw();
}

function resetCrop() {
  if (!selectedImage) return;
  selectedImage.crop = defaultCrop();
  draw();
}

function exportSelectedImage() {
  if (!selectedImage || !selectedImage.img) {
    console.log("No selected image to export");
    return;
  }

  const { srcX, srcY, srcW, srcH } = getRenderBox(selectedImage);
  const out = document.createElement("canvas");
  out.width = srcW;
  out.height = srcH;
  const outCtx = out.getContext("2d");
  outCtx.drawImage(selectedImage.img, srcX, srcY, srcW, srcH, 0, 0, srcW, srcH);

  out.toBlob(blob => {
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `selected_${Date.now()}.png`;
    a.click();
    URL.revokeObjectURL(url);
  }, "image/png");
}

let zScanMode = false;
let zScanIndex = -1;
let multiSelectMode = false;

let dragMode = "none";
let dragWorldX = 0;
let dragWorldY = 0;
let dragSelectionStart = [];
let spacePanHeld = false;
let panLockMode = false;

let marqueeActive = false;
let marqueeAdditive = false;
let marqueeStartScreenX = 0;
let marqueeStartScreenY = 0;
let marqueeCurrentScreenX = 0;
let marqueeCurrentScreenY = 0;
let marqueeBaseSelection = new Set();

function setZScanFromSelection() {
  if (!selectedImage) {
    zScanIndex = images.length - 1;
    return;
  }
  zScanIndex = images.indexOf(selectedImage);
}

function stepZScan(step) {
  if (!images.length) return;
  if (zScanIndex < 0) zScanIndex = images.length - 1;
  zScanIndex += step;
  if (zScanIndex < 0) zScanIndex = 0;
  if (zScanIndex > images.length - 1) zScanIndex = images.length - 1;
  selectedImage = images[zScanIndex] || null;
  draw();
}

function isDeleteKey(e) {
  return e.key === "Delete" || e.key === "Del" || e.code === "Delete";
}

function isBackspaceKey(e) {
  return e.key === "Backspace" || e.code === "Backspace";
}

function setSelectionFromSet(nextSet) {
  selectedImages.clear();
  nextSet.forEach(obj => {
    if (images.includes(obj)) selectedImages.add(obj);
  });

  selectedImage = null;
  for (let i = images.length - 1; i >= 0; i--) {
    if (selectedImages.has(images[i])) {
      selectedImage = images[i];
      break;
    }
  }
}

function clearSelection() {
  selectedImages.clear();
  selectedImage = null;
}

function selectOnly(obj) {
  if (!obj) {
    clearSelection();
    return;
  }
  selectedImages.clear();
  selectedImages.add(obj);
  selectedImage = obj;
}

function addToSelection(obj) {
  if (!obj) return;
  selectedImages.add(obj);
  selectedImage = obj;
}

function removeFromSelection(obj) {
  if (!obj) return;
  selectedImages.delete(obj);
  if (selectedImage === obj) {
    selectedImage = null;
    for (let i = images.length - 1; i >= 0; i--) {
      if (selectedImages.has(images[i])) {
        selectedImage = images[i];
        break;
      }
    }
  }
}

function screenToWorld(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const cx = clientX - rect.left - canvas.width / 2;
  const cy = clientY - rect.top - canvas.height / 2;
  return {
    wx: (cx / scale) - offsetX,
    wy: (cy / scale) - offsetY
  };
}

function getMarqueeBoundsWorld() {
  const a = screenToWorld(marqueeStartScreenX, marqueeStartScreenY);
  const b = screenToWorld(marqueeCurrentScreenX, marqueeCurrentScreenY);
  return {
    left: Math.min(a.wx, b.wx),
    right: Math.max(a.wx, b.wx),
    top: Math.min(a.wy, b.wy),
    bottom: Math.max(a.wy, b.wy)
  };
}

function updateSelectionFromMarquee() {
  const bounds = getMarqueeBoundsWorld();
  const hits = new Set();

  images.forEach(obj => {
    const { drawW, drawH } = getRenderBox(obj);
    const objLeft = obj.x;
    const objRight = obj.x + drawW;
    const objTop = obj.y;
    const objBottom = obj.y + drawH;
    const overlaps = !(objRight < bounds.left || objLeft > bounds.right || objBottom < bounds.top || objTop > bounds.bottom);
    if (overlaps) hits.add(obj);
  });

  if (marqueeAdditive) {
    const combined = new Set(marqueeBaseSelection);
    hits.forEach(obj => combined.add(obj));
    setSelectionFromSet(combined);
  } else {
    setSelectionFromSet(hits);
  }
}

function updateToolBadge() {
  if (!toolBadge) return;

  const lines = [];
  lines.push("Mouse: Drag image move | Empty drag pan | Wheel zoom | Shift+Wheel resize selected");
  lines.push("Drop image files on canvas to place at cursor");
  lines.push("Ctrl+S Save Layout | Ctrl+L Load Newest | Ctrl+Alt+E Export Selected PNG");
  lines.push("Delete/Backspace remove selected layer | Ctrl+Delete remove loaded layout file");
  lines.push("Multi Select: M toggle | Drag empty in M mode for box select");
  lines.push(`Pan: Hold Space+Drag anywhere | P toggle pan lock (${panLockMode ? "ON" : "OFF"})`);
  lines.push("Layouts: Ctrl+ArrowDown back one | Ctrl+ArrowUp forward one");
  lines.push("Ctrl+[ / Ctrl+] reorder | Ctrl+Shift+[ / Ctrl+Shift+] send back/front");
  lines.push("Crop: Alt+Arrows add crop | Alt+Shift+Arrows reduce | Alt+0 reset");
  lines.push("Z Scan: Z toggle | , previous | . next");
  lines.push(`Multi Select Status: ${multiSelectMode ? "ON" : "OFF"} | ${selectedImages.size} selected`);

  if (selectedImage) {
    const index = images.indexOf(selectedImage);
    const crop = getCropFor(selectedImage);
    lines.push(`Selected layer: ${index + 1}/${images.length}`);
    lines.push(`Crop L${crop.left} T${crop.top} R${crop.right} B${crop.bottom}`);
  } else {
    lines.push("Selected layer: none");
  }

  if (zScanMode && zScanIndex >= 0) {
    lines.push(`Z scan active on layer ${zScanIndex + 1}/${images.length}`);
  }

  toolBadge.textContent = lines.join("\n");
}


function bringForward() {
  if (!selectedImage) return;
  const i = images.indexOf(selectedImage);
  if (i < images.length - 1) {
    [images[i], images[i+1]] = [images[i+1], images[i]];
    draw();
  }
}

function sendBackward() {
  if (!selectedImage) return;
  const i = images.indexOf(selectedImage);
  if (i > 0) {
    [images[i], images[i-1]] = [images[i-1], images[i]];
    draw();
  }
}

function bringToFront() {
  if (!selectedImage) return;
  const i = images.indexOf(selectedImage);
  if (i !== images.length - 1) {
    images.splice(i, 1);
    images.push(selectedImage);
    draw();
  }
}

function sendToBack() {
  if (!selectedImage) return;
  const i = images.indexOf(selectedImage);
  if (i !== 0) {
    images.splice(i, 1);
    images.unshift(selectedImage);
    draw();
  }
}

function deleteSelectedImage() {
  if (!selectedImages.size && !selectedImage) return;

  const toDelete = new Set(selectedImages);
  if (!toDelete.size && selectedImage) toDelete.add(selectedImage);
  if (!toDelete.size) return;

  let firstDeletedIndex = images.length;
  for (let i = images.length - 1; i >= 0; i--) {
    if (toDelete.has(images[i])) {
      firstDeletedIndex = Math.min(firstDeletedIndex, i);
      images.splice(i, 1);
    }
  }

  clearSelection();

  if (zScanMode) {
    if (!images.length) {
      zScanIndex = -1;
    } else {
      zScanIndex = Math.min(firstDeletedIndex, images.length - 1);
      selectedImage = images[zScanIndex] || null;
      if (selectedImage) selectedImages.add(selectedImage);
    }
  }

  draw();
}

function deleteCurrentLayoutFile() {
  if (!currentLayoutFile) {
    console.log("No loaded layout file selected to delete");
    return;
  }

  const fileToDelete = currentLayoutFile;
  const confirmed = window.confirm(`Delete layout file ${fileToDelete}?`);
  if (!confirmed) return;

  fetch("http://localhost:9000/" + encodeURIComponent(fileToDelete), {
    method: "DELETE"
  })
    .then(res => {
      if (!res.ok) throw new Error(`Delete failed with status ${res.status}`);
      return res.json().catch(() => null);
    })
    .then(() => {
      console.log("Deleted layout:", fileToDelete);
      if (currentLayoutFile === fileToDelete) {
        currentLayoutFile = null;
      }
      if (layoutIndex > 0) layoutIndex -= 1;
      updateToolBadge();
    })
    .catch(err => {
      console.error("Failed to delete layout file:", err);
    });
}


function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
}
window.addEventListener("resize", resize);

function saveLayout() {
  const data = images.map(img => ({
    src: img.img.src,
    x: img.x,
    y: img.y,
    scale: img.scale,
    crop: normalizeCrop(img.crop || defaultCrop())
  }));

  fetch("http://localhost:9000", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  }).then(res => res.json())
    .then(payload => {
      if (payload && payload.file) {
        currentLayoutFile = payload.file;
      }
      layoutIndex = 0;
      console.log("Layout saved", payload && payload.file ? `as ${payload.file}` : "");
      updateToolBadge();
    })
    .catch(err => {
      console.error("Failed to save layout:", err);
  });
}

function loadLatestLayout() {
  fetch("http://localhost:9000")
    .then(res => res.json())
    .then(files => {
      if (!files.length) {
        currentLayoutFile = null;
        console.log("No saved layouts found");
        return;
      }

      const latest = files[0];
      currentLayoutFile = latest;
      layoutIndex = 0;
      console.log("Loading:", latest);

      fetch("http://localhost:9000/" + latest)
        .then(res => res.json())
        .then(data => {
          images.length = 0;
          clearSelection();

          data.forEach(obj => {
            const img = new Image();
            img.src = obj.src;
            img.onload = () => {
              images.push({
                img,
                x: obj.x,
                y: obj.y,
                scale: obj.scale,
                crop: normalizeCrop(obj.crop || defaultCrop())
              });
              draw();
            };
          });
        });
    });
}

function loadLayoutByIndex(index) {
  fetch("http://localhost:9000/")
    .then(res => res.json())
    .then(files => {
      if (!files.length) {
        currentLayoutFile = null;
        return;
      }

      // Clamp index to valid range
      if (index < 0) index = 0;
      if (index >= files.length) index = files.length - 1;

      layoutIndex = index; // update global index

      const file = files[index];
      currentLayoutFile = file;
      console.log("Loading:", file);

      fetch("http://localhost:9000/" + file)
        .then(res => res.json())
        .then(data => {
          images.length = 0;
          clearSelection();

          data.forEach(obj => {
            const img = new Image();
            img.src = obj.src;
            img.onload = () => {
              images.push({
                img,
                x: obj.x,
                y: obj.y,
                scale: obj.scale,
                crop: normalizeCrop(obj.crop || defaultCrop())
              });
              draw();
            };
          });
        });
    });
}


document.addEventListener("keydown", e => {
  if (e.ctrlKey && e.altKey && e.key.toLowerCase() === "e") {
    e.preventDefault();
    exportSelectedImage();
    return;
  }

  // Ctrl+S = save
  if (e.ctrlKey && e.key === "s") {
    e.preventDefault();
    saveLayout();
  }

  // Ctrl+L = load latest
  if (e.ctrlKey && e.key === "l") {
    e.preventDefault();
    loadLatestLayout();
  }

  if (e.ctrlKey && isDeleteKey(e)) {
    e.preventDefault();
    console.log("[delete] Ctrl+Delete pressed", { key: e.key, code: e.code, currentLayoutFile });
    deleteCurrentLayoutFile();
    return;
  }
  
}, { capture: true });

window.addEventListener("keydown", e => {
  if (!e.ctrlKey && !e.metaKey && !e.altKey && e.code === "Space") {
    e.preventDefault();
    spacePanHeld = true;
    return;
  }

  if (e.ctrlKey || e.metaKey || e.altKey) return;

  if (e.key.toLowerCase() === "p") {
    e.preventDefault();
    panLockMode = !panLockMode;
    console.log("[pan] lock", panLockMode ? "ON" : "OFF");
    draw();
    return;
  }

  if (e.key.toLowerCase() === "m") {
    e.preventDefault();
    multiSelectMode = !multiSelectMode;
    console.log("[multi] mode", multiSelectMode ? "ON" : "OFF");
    marqueeActive = false;
    draw();
    return;
  }

  if (!isDeleteKey(e) && !isBackspaceKey(e)) return;

  console.log("[delete] key pressed", {
    key: e.key,
    code: e.code,
    hasSelection: Boolean(selectedImage),
    imageCount: images.length
  });

  if (!selectedImage) {
    console.log("[delete] ignored - no selected image");
    return;
  }

  e.preventDefault();
  deleteSelectedImage();
  console.log("[delete] selected image removed");
}, { capture: true });

window.addEventListener("keyup", e => {
  if (e.code === "Space") {
    spacePanHeld = false;
  }
}, { capture: true });

window.addEventListener("keydown", e => {
  if (e.ctrlKey || e.metaKey) return;

  if (e.key.toLowerCase() === "z") {
    e.preventDefault();
    zScanMode = !zScanMode;
    setZScanFromSelection();
    draw();
    return;
  }

  if (zScanMode && e.key === ",") {
    e.preventDefault();
    stepZScan(-1);
    return;
  }

  if (zScanMode && e.key === ".") {
    e.preventDefault();
    stepZScan(1);
    return;
  }

  if (!selectedImage) return;

  if (e.altKey && e.key === "0") {
    e.preventDefault();
    resetCrop();
    return;
  }

  if (!e.altKey) return;

  const delta = e.shiftKey ? -10 : 10;

  if (e.key === "ArrowLeft") {
    e.preventDefault();
    adjustCrop("left", delta);
    return;
  }

  if (e.key === "ArrowRight") {
    e.preventDefault();
    adjustCrop("right", delta);
    return;
  }

  if (e.key === "ArrowUp") {
    e.preventDefault();
    adjustCrop("top", delta);
    return;
  }

  if (e.key === "ArrowDown") {
    e.preventDefault();
    adjustCrop("bottom", delta);
  }
});

window.addEventListener("keydown", e => {

  // Load newest
  if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key === "l") {
    e.preventDefault();
    loadLayoutByIndex(0);
  }

  // Load previous
  if (e.ctrlKey && e.shiftKey && !e.altKey && e.key === "l") {
    e.preventDefault();
    loadLayoutByIndex(1);
  }

  // Load two saves back
  if (e.ctrlKey && e.altKey && !e.shiftKey && e.key === "l") {
    e.preventDefault();
    loadLayoutByIndex(2);
  }

  // Scroll newer
  if (e.ctrlKey && e.key === "ArrowUp") {
    e.preventDefault();
    loadLayoutByIndex(layoutIndex - 1);
  }

  // Scroll older
  if (e.ctrlKey && e.key === "ArrowDown") {
    e.preventDefault();
    loadLayoutByIndex(layoutIndex + 1);
  }

});


document.addEventListener("keydown", e => {
  if (!e.ctrlKey) return;

  const isBracketLeft = e.code === "BracketLeft" || e.key === "[" || e.key === "{";
  const isBracketRight = e.code === "BracketRight" || e.key === "]" || e.key === "}";
  const isFrontFallback = e.shiftKey && (e.code === "Home" || e.key === "Home");
  const isBackFallback = e.shiftKey && (e.code === "End" || e.key === "End");

  function logShortcut(action) {
    console.log("[shortcut]", action, {
      key: e.key,
      code: e.code,
      ctrl: e.ctrlKey,
      shift: e.shiftKey,
      alt: e.altKey,
      meta: e.metaKey
    });
  }

  // Bring forward
  if (!e.shiftKey && isBracketRight) {
    e.preventDefault();
    logShortcut("bringForward");
    bringForward();
    return;
  }

  // Send backward
  if (!e.shiftKey && isBracketLeft) {
    e.preventDefault();
    logShortcut("sendBackward");
    sendBackward();
    return;
  }

  // Bring to front
  if (e.shiftKey && isBracketRight) {
    e.preventDefault();
    logShortcut("bringToFront");
    bringToFront();
    return;
  }

  // Send to back
  if (e.shiftKey && isBracketLeft) {
    e.preventDefault();
    logShortcut("sendToBack");
    sendToBack();
    return;
  }

  // Fallbacks that avoid ArrowUp/ArrowDown layout navigation
  if (isFrontFallback) {
    e.preventDefault();
    logShortcut("bringToFront (fallback Ctrl+Shift+Home)");
    bringToFront();
    return;
  }

  if (isBackFallback) {
    e.preventDefault();
    logShortcut("sendToBack (fallback Ctrl+Shift+End)");
    sendToBack();
    return;
  }

}, { capture: true });


// Camera
let offsetX = 0;
let offsetY = 0;
let scale = 1;

// Image selection + dragging
let selectedImage = null;
const selectedImages = new Set();
let dragImageOffsetX = 0;
let dragImageOffsetY = 0;

// Stored images
const images = [];

// Draw grid + images
function draw() {
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.translate(canvas.width/2, canvas.height/2);
  ctx.scale(scale, scale);
  ctx.translate(offsetX, offsetY);

  drawGrid();

  images.forEach((obj, index) => {
    if (!obj.img) return;

    const { srcX, srcY, srcW, srcH, drawW, drawH } = getRenderBox(obj);

    const isScannedLayer = zScanMode && index === zScanIndex;
    const isNeighborLayer = zScanMode && (index === zScanIndex - 1 || index === zScanIndex + 1);
    ctx.globalAlpha = zScanMode ? (isScannedLayer ? 1 : (isNeighborLayer ? 0.55 : 0.1)) : 1;

    ctx.drawImage(obj.img, srcX, srcY, srcW, srcH, obj.x, obj.y, drawW, drawH);
    ctx.globalAlpha = 1;

    if (isNeighborLayer) {
      ctx.strokeStyle = index < zScanIndex ? "rgba(255,191,0,0.9)" : "rgba(255,50,160,0.9)";
      ctx.lineWidth = 2 / scale;
      ctx.strokeRect(obj.x, obj.y, drawW, drawH);
    }

    // Draw selection outline(s)
    if (selectedImages.has(obj) || obj === selectedImage) {
      const isPrimary = obj === selectedImage;
      ctx.strokeStyle = isPrimary ? "rgba(0,255,255,0.95)" : "rgba(0,180,255,0.7)";
      ctx.lineWidth = (isPrimary ? 3 : 2) / scale;
      ctx.strokeRect(obj.x, obj.y, drawW, drawH);
    }
  });

  if (marqueeActive) {
    const x = Math.min(marqueeStartScreenX, marqueeCurrentScreenX);
    const y = Math.min(marqueeStartScreenY, marqueeCurrentScreenY);
    const w = Math.abs(marqueeCurrentScreenX - marqueeStartScreenX);
    const h = Math.abs(marqueeCurrentScreenY - marqueeStartScreenY);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = "rgba(0,180,255,0.14)";
    ctx.strokeStyle = "rgba(0,220,255,0.9)";
    ctx.lineWidth = 1;
    ctx.fillRect(x, y, w, h);
    ctx.strokeRect(x, y, w, h);
  }

  updateToolBadge();
}

function drawGrid() {
  const step = 200;
  ctx.strokeStyle = "rgba(255,255,255,0.1)";
  ctx.lineWidth = 1 / scale;

  ctx.beginPath();
  for (let x = -5000; x <= 5000; x += step) {
    ctx.moveTo(x, -5000);
    ctx.lineTo(x, 5000);
  }
  for (let y = -5000; y <= 5000; y += step) {
    ctx.moveTo(-5000, y);
    ctx.lineTo(5000, y);
  }
  ctx.stroke();
}

// Hit test
function getImageAtWorldPos(wx, wy) {
  for (let i = images.length - 1; i >= 0; i--) {
    const obj = images[i];
    const { drawW, drawH } = getRenderBox(obj);

    if (wx >= obj.x && wx <= obj.x + drawW &&
        wy >= obj.y && wy <= obj.y + drawH) {
      return obj;
    }
  }
  return null;
}


// Panning + image dragging
let dragging = false;
let lastX = 0;
let lastY = 0;

canvas.addEventListener("mousedown", e => {
  if (e.button === 1) {
    e.preventDefault();
  }

  const { wx, wy } = screenToWorld(e.clientX, e.clientY);
  const forcePan = spacePanHeld || panLockMode || e.button === 1;

  if (forcePan) {
    dragMode = "pan";
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
    marqueeActive = false;
    draw();
    return;
  }

  const hit = getImageAtWorldPos(wx, wy);
  if (hit) {
    if (multiSelectMode) {
      if (e.ctrlKey || e.metaKey) {
        if (selectedImages.has(hit)) {
          removeFromSelection(hit);
        } else {
          addToSelection(hit);
        }
      } else {
        addToSelection(hit);
      }
    } else {
      selectOnly(hit);
    }

    if (zScanMode) setZScanFromSelection();
    dragMode = "move";
    dragging = true;
    dragWorldX = wx;
    dragWorldY = wy;
    dragImageOffsetX = wx - hit.x;
    dragImageOffsetY = wy - hit.y;
    const moveTargets = selectedImages.size ? Array.from(selectedImages) : [hit];
    dragSelectionStart = moveTargets.map(obj => ({ obj, x: obj.x, y: obj.y }));
    draw();
    return;
  }

  if (multiSelectMode) {
    dragMode = "marquee";
    marqueeActive = true;
    marqueeAdditive = Boolean(e.shiftKey);
    marqueeBaseSelection = new Set(selectedImages);
    marqueeStartScreenX = e.clientX;
    marqueeStartScreenY = e.clientY;
    marqueeCurrentScreenX = e.clientX;
    marqueeCurrentScreenY = e.clientY;
    if (!marqueeAdditive) clearSelection();
    dragging = true;
    draw();
    return;
  }

  clearSelection();
  dragMode = "pan";
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
  draw();
});

window.addEventListener("mouseup", () => {
  if (dragMode === "marquee") {
    updateSelectionFromMarquee();
    marqueeActive = false;
  }
  dragging = false;
  dragMode = "none";
  draw();
});

window.addEventListener("mousemove", e => {
  if (!dragging) return;

  const { wx, wy } = screenToWorld(e.clientX, e.clientY);

  if (dragMode === "move") {
    if (dragSelectionStart.length > 1) {
      const dx = wx - dragWorldX;
      const dy = wy - dragWorldY;
      dragSelectionStart.forEach(entry => {
        entry.obj.x = entry.x + dx;
        entry.obj.y = entry.y + dy;
      });
    } else if (selectedImage) {
      selectedImage.x = wx - dragImageOffsetX;
      selectedImage.y = wy - dragImageOffsetY;
    }
    draw();
    return;
  }

  if (dragMode === "marquee") {
    marqueeCurrentScreenX = e.clientX;
    marqueeCurrentScreenY = e.clientY;
    updateSelectionFromMarquee();
    draw();
    return;
  }

  if (dragMode !== "pan") return;

  offsetX += (e.clientX - lastX) / scale;
  offsetY += (e.clientY - lastY) / scale;
  lastX = e.clientX;
  lastY = e.clientY;
  draw();
});

// Zoom OR resize selected image
canvas.addEventListener("wheel", e => {
  e.preventDefault();

  // SHIFT + wheel = resize selected image
  if (selectedImage && e.shiftKey) {
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    selectedImage.scale *= factor;
    draw();
    return;
  }

  // Normal camera zoom
  const zoom = e.deltaY < 0 ? 1.1 : 0.9;

  const mx = e.clientX - canvas.width/2;
  const my = e.clientY - canvas.height/2;

  const wx = mx/scale - offsetX;
  const wy = my/scale - offsetY;

  scale *= zoom;

  const wx2 = mx/scale - offsetX;
  const wy2 = my/scale - offsetY;

  offsetX += wx2 - wx;
  offsetY += wy2 - wy;

  draw();
}, { passive:false });

// Drag & Drop Images
canvas.addEventListener("dragover", e => e.preventDefault());

canvas.addEventListener("drop", e => {
  e.preventDefault();

  const file = e.dataTransfer.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = evt => {
    const img = new Image();
    img.src = evt.target.result;

    img.onload = () => {
      const rect = canvas.getBoundingClientRect();
      const cx = e.clientX - rect.left - canvas.width/2;
      const cy = e.clientY - rect.top - canvas.height/2;

      const worldX = (cx / scale) - offsetX;
      const worldY = (cy / scale) - offsetY;

      images.push({
        img,
        x: worldX,
        y: worldY,
        scale: 1,
        crop: defaultCrop()
      });

      if (!multiSelectMode) {
        selectOnly(images[images.length - 1]);
      } else {
        addToSelection(images[images.length - 1]);
      }

      draw();
    };
  };
  reader.readAsDataURL(file);
});

resize();
</script>

</body>
</html>
